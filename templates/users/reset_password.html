{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h4 class="mb-1">{{ title }}</h4>
        <p class="text-muted mb-0">{{ user_object.username }}</p>
    </div>
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary btn-action">
        <i class="bi bi-arrow-right me-1"></i> العودة
    </a>
</div>

<div class="table-container">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">{{ form.new_password.label }}</label>
            {{ form.new_password }}
            {% if form.new_password.errors %}
            <div class="text-danger small">{{ form.new_password.errors }}</div>
            {% endif %}
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-key me-1"></i> إعادة تعيين
            </button>
            <a href="{% url 'user_list' %}" class="btn btn-outline-secondary px-4">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
