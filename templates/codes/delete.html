{% extends 'base.html' %}

{% block title %}حذف كود{% endblock %}

{% block content %}

<div class="page-header">
    <h4 class="mb-0">حذف كود</h4>
</div>

<div class="table-container text-center py-5">
    <div class="fs-1">⚠️</div>
    <h5 class="mt-3">هل أنت متأكد من حذف هذا الكود؟</h5>
    <p class="text-muted">
        <strong>{{ code.code }}</strong>
        <br>
        الصنف: {{ code.medicine.name }}
    </p>
    <form method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4 me-2">
            <i class="bi bi-trash me-1"></i> نعم، احذف
        </button>
        <a href="{% url 'code_list' %}?medicine={{ code.medicine.pk }}"
            class="btn btn-outline-secondary px-4">
            إلغاء
        </a>
    </form>
</div>

{% endblock %}
