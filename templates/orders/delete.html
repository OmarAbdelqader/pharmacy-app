{% extends 'base.html' %}

{% block title %}حذف طلب{% endblock %}

{% block content %}

<div class="page-header">
    <h4 class="mb-0">حذف طلب شراء</h4>
</div>

<div class="table-container text-center py-5">
    <div class="fs-1">⚠️</div>
    <h5 class="mt-3">هل أنت متأكد من حذف هذا الطلب؟</h5>
    <p class="text-muted">
        <strong>{{ order.po_number }}</strong> — {{ order.supplier.name }}
        <br>
        سيتم حذف جميع أصناف هذا الطلب
        <br>
        لا يمكن التراجع عن هذه العملية
    </p>
    <form method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4 me-2">
            <i class="bi bi-trash me-1"></i> نعم، احذف
        </button>
        <a href="{% url 'order_list' %}" class="btn btn-outline-secondary px-4">
            إلغاء
        </a>
    </form>
</div>

{% endblock %}
